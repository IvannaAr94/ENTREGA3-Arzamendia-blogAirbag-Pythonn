{% extends 'base.html' %}

{% block contenido %}
<section class="section-title mb-4">
    <p class="text-uppercase text-danger fw-bold small mb-1">Banda</p>
    <h2>Integrantes registrados</h2>
</section>

<div class="row g-4">
    {% for integrante in integrantes %}
    <div class="col-md-4">
        <div class="card info-card shadow-sm h-100">
            <div class="card-body">
                <h3>{{ integrante.nombre }}</h3>
                <p class="fw-bold text-danger">{{ integrante.instrumento }}</p>
                <p>{{ integrante.descripcion }}</p>
            </div>
        </div>
    </div>
    {% empty %}
    <p>No hay integrantes cargados.</p>
    {% endfor %}
</div>
{% endblock %}
